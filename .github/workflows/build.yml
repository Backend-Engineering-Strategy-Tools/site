name: Deploy Hugo site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Download latest CV & letters
        run: |
          mkdir -p static
          CV_URL=$(curl -s https://api.github.com/repos/Backend-Engineering-Strategy-Tools/cv/releases/latest | jq -r '.assets[] | select(.name=="cv_standard.pdf") | .browser_download_url')
          LETTER_URL=$(curl -s https://api.github.com/repos/Backend-Engineering-Strategy-Tools/cv/releases/latest | jq -r '.assets[] | select(.name=="letter_standard.pdf") | .browser_download_url')
          curl -L -o static/cv.pdf $CV_URL
          curl -L -o static/letter.pdf $LETTER_URL

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4