name: Deploy Hugo site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Download latest CV & letters
        run: |
          mkdir -p static
          LATEST_TAG=$(curl -s -H "Authorization: token ${{ secrets.BEST_SITE_PAT }}" https://api.github.com/repos/Backend-Engineering-Strategy-Tools/cv/releases/latest | jq -r '.tag_name')
          echo ${LATEST_TAG}
          curl -L -H "Authorization: token ${{ secrets.BEST_SITE_PAT }}" -o static/cv.pdf https://github.com/Backend-Engineering-Strategy-Tools/cv/releases/download/${LATEST_TAG}/cv_standard.pdf
          curl -L -H "Authorization: token ${{ secrets.BEST_SITE_PAT }}"  -o static/letter.pdf https://github.com/Backend-Engineering-Strategy-Tools/cv/releases/download/${LATEST_TAG}/letter_standard.pdf
          ls -la static/**

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4