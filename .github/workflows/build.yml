name: Deploy Hugo site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Download latest CV & letters
        run: |
          mkdir -p static
          LATEST_JSON=$(curl -s -H "Authorization: token ${{ secrets.BEST_SITE_PAT }}" https://api.github.com/repos/Backend-Engineering-Strategy-Tools/cv/releases/latest)
          # Extract asset ID for CV and Letter
          CV_ID=$(echo "$LATEST_JSON" | jq -r '.assets[] | select(.name=="cv_standard.pdf") | .id')
          LETTER_ID=$(echo "$LATEST_JSON" | jq -r '.assets[] | select(.name=="letter_standard.pdf") | .id')
          # Download asset using API (private repos need this endpoint)
          curl -L -H "Authorization: token ${{ secrets.BEST_SITE_PAT }}" -H "Accept: application/octet-stream" https://api.github.com/repos/Backend-Engineering-Strategy-Tools/cv/releases/assets/${CV_ID} -o static/cv.pdf
          curl -L -H "Authorization: token ${{ secrets.BEST_SITE_PAT }}" -H "Accept: application/octet-stream" https://api.github.com/repos/Backend-Engineering-Strategy-Tools/cv/releases/assets/${LETTER_ID} -o static/letter.pdf
          ls -la static/**

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4